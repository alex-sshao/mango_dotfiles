# reload config
bind=super,r,spawn_shell,bash ~/.config/mango/scripts/config_check.sh
bind=super,r,reload_config

# menu and terminal
#bind=ctrl,alt,Return,spawn,foot
bind=ctrl+alt,t,spawn,kitty
bind=alt,f2,spawn,rofi -config ~/.config/mango/rofi/config.rasi -show drun
bind=alt,space,spawn,rofi -config ~/.config/mango/rofi/config.rasi -show drun
# bind=alt,space,spawn,fuzzel

# exit super+m
# bind=super,code:58,quit
bind=super,m,quit
# killclient super+q
# bind=alt,code:24,killclient,
bind=alt,q,killclient,

# switch window focus
bind=super,Tab,focusstack,next
bind=super,u,focuslast
#bind=alt,Left,focusdir,left
#bind=alt,Right,focusdir,right
#bind=alt,Up,focusdir,up
#bind=alt,Down,focusdir,down
bind=alt,h,focusdir,left
bind=alt,l,focusdir,right
bind=alt,k,focusdir,up
bind=alt,j,focusdir,down

# swap window
bind=ctrl+alt,k,exchange_client,up
bind=ctrl+alt,j,exchange_client,down
bind=ctrl+alt,h,exchange_client,left
bind=ctrl+alt,l,exchange_client,right

# movewin
bind=ctrl+shift,Up,movewin,+0,-50
bind=ctrl+shift,Down,movewin,+0,+50
bind=ctrl+shift,Left,movewin,-50,+0
bind=ctrl+shift,Right,movewin,+50,+0


# resizewin
bind=ctrl+alt,Up,resizewin,+0,-50
bind=ctrl+alt,Down,resizewin,+0,+50
bind=ctrl+alt,Left,resizewin,-50,+0
bind=ctrl+alt,Right,resizewin,+50,+0

# switch window status
bind=super,g,toggleglobal,
bind=alt,Tab,toggleoverview,0
bind=alt,r,togglefloating,
bind=alt,c,centerwin,
bind=alt,a,togglemaximizescreen,
bind=super,f,togglefullscreen,
bind=super+shift,f,togglefakefullscreen,
bind=super,i,minimized,
bind=super,o,toggleoverlay,
bind=super+shift,I,restore_minimized
bind=alt,z,toggle_scratchpad

# jcroller layout
bind=alt,d,set_proportion,0.5
bind=alt,f,set_proportion,0.8
bind=alt,g,set_proportion,1.0
bind=alt,x,switch_proportion_preset,next
#bind=alt,period,switch_proportion_preset,next
bind=alt,comma,resizewin,-200,+0
bind=alt,period,resizewin,+200,+0
bind=alt+super,h,scroller_stack,left
bind=alt+super,l,scroller_stack,right
bind=alt+super,k,scroller_stack,up
bind=alt+super,j,scroller_stack,down

#dwindle layout
bind=alt+shift,Return,dwindle_toggle_split_direction

# tile layout
bind=super,e,incnmaster,1
bind=super,t,incnmaster,-1
bind=alt,s,zoom,

# switch layout
bind=super,k,setlayout,tile
bind=super,l,setlayout,scroller
bind=super,n,switch_layout

# tag switch
bind=super,k,viewtoleft,0
#bind=ctrl,Left,viewtoleft_have_client,0
bind=super,j,viewtoright,0
#bind=ctrl,Right,viewtoright_have_client,0
bind=ctrl+super,Left,tagtoleft,0
bind=ctrl+super,Right,tagtoright,0

bind=ctrl+alt,1,tag,1,0
bind=ctrl+alt,2,tag,2,0
bind=ctrl+alt,3,tag,3,0
bind=ctrl+alt,4,tag,4,0
bind=ctrl+alt,5,tag,5,0
bind=ctrl+alt,6,tag,6,0
bind=ctrl+alt,7,tag,7,0
bind=ctrl+alt,8,tag,8,0
bind=ctrl+alt,9,tag,9,0

bind=ctrl,1,view,1,0
bind=ctrl,2,view,2,0
bind=ctrl,3,view,3,0
bind=ctrl,4,view,4,0
bind=ctrl,5,view,5,0
bind=ctrl,6,view,6,0
bind=ctrl,7,view,7,0
bind=ctrl,8,view,8,0
bind=ctrl,9,view,9,0

bind=ctrl+super,1,toggletag,1
bind=ctrl+super,2,toggletag,2
bind=ctrl+super,3,toggletag,3
bind=ctrl+super,4,toggletag,4
bind=ctrl+super,5,toggletag,5
bind=ctrl+super,6,toggletag,6
bind=ctrl+super,7,toggletag,7
bind=ctrl+super,8,toggletag,8
bind=ctrl+super,9,toggletag,9

bind=super,1,toggleview,1
bind=super,2,toggleview,2
bind=super,3,toggleview,3
bind=super,4,toggleview,4
bind=super,5,toggleview,5
bind=super,6,toggleview,6
bind=super,7,toggleview,7
bind=super,8,toggleview,8
bind=super,9,toggleview,9

# monitor switch
bind=alt+shift,h,focusmon,left
bind=alt+shift,l,focusmon,right
bind=alt+shift,k,focusmon,up
bind=alt+shift,j,focusmon,down
bind=super+shift+alt,h,tagmon,left
bind=super+shift+alt,l,tagmon,right
bind=super+shift+alt,k,tagmon,up
bind=super+shift+alt,j,tagmon,down

# gaps
bind=alt+shift,X,incgaps,1
bind=alt+shift,Z,incgaps,-1
bind=alt+shift,R,togglegaps


# Mouse Button Bindings
mousebind=super,btn_left,moveresize,curmove
mousebind=alt,btn_middle,set_proportion,0.5
mousebind=super,btn_right,moveresize,curresize
mousebind=super+ctrl,btn_left,minimized
mousebind=super+ctrl,btn_right,killclient
mousebind=super+ctrl,btn_middle,togglefullscreen
#mousebind=NONE,btn_middle,togglemaximizescreen,0

# Axis Bindings
axisbind=super,UP,viewtoleft_have_client
axisbind=super,DOWN,viewtoright_have_client
axisbind=alt,UP,focusdir,left
axisbind=alt,DOWN,focusdir,right
axisbind=shift+super,UP,exchange_client,left
axisbind=shift+super,DOWN,exchange_client,right

# Gesturebind
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview,1
gesturebind=none,down,4,toggleoverview,1

# brightness and volume
bind=none,XF86AudioRaiseVolume,spawn,~/.config/mango/scripts/volume.sh up
bind=none,XF86AudioLowerVolume,spawn,~/.config/mango/scripts/volume.sh down
bind=none,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/brightness.sh up
bind=none,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/brightness.sh down

#custom app bind
bind=super,o,spawn_shell,waterfox --new-window #Waterfox!
bind=super,p,spawn_shell,waterfox --private-window #Waterfox!

## yazi term finder
#bind=ctrl+super,Return,spawn,foot -e yazi
bind=ctrl+alt,f,spawn_shell,kitty -e yazi # Spawn Yazi (File navigation)

#_shell
bind=ctrl+alt,s,spawn_shell,grim -g "$(slurp -b '#3f100f55' -c '#3f1f1fff')" -t ppm - | satty -f - --disable-notifications --initial-tool=arrow --copy-command=wl-copy --config ~/.config/mango/satty/config.toml --  # Screenshot util
bind=super,h,spawn,bash ~/.config/mango/scripts/hide_waybar_mango.sh # Hide Waybar
#bind=super,l,spawn,owaylock -f -c 000000 
bind=ctrl+alt,backslash,spawn,swaync-client -t # Open notif panel
bind=ctrl+alt,BackSpace,spawn,swaync-client -C # Close all notif
bind=super,escape,spawn_shell,kitty btop # run BTOP

