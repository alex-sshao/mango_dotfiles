# XDG Desktop Portal
env=XDG_CURRENT_DESKTOP,wlroots
env=XDG_SESSION_TYPE,wayland
env=XDG_SESSION_DESKTOP,wlroots
env=XDG_SESSION_CLASS,user

# QT
env=QT_QPA_PLATFORM,wayland;xcb
env=QT_QPA_PLATFORMTHEME,qt6ct
env=QT_QPA_PLATFORMTHEME_QT6,qt6ct
env=QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env=QT_AUTO_SCREEN_SCALE_FACTOR,1.3
env=QT_WAYLAND_FORCE_DPI,140

# GTK
env=GDK_SCALE,1
#env=GTK_THEME,adw-gtk3-dark

# Mozilla
env=MOZ_ENABLE_WAYLAND,1


env=LIBVA_DRIVER_NAME,nvidia
env=GBM_BACKEND,nvidia-drm
env=GLX_VENDOR_LIBRARY_NAME,nvidia
env=GL_VRR_ALLOWED,1
env=WLR_DRM_NO_ATOMIC,1

env=WLR_NO_HARDWARE_CURSORS,2
env=XCURSOR_THEME,Oxygen_Blue
env=XCURSOR_SIZE,24

env=DISPLAY,:0
